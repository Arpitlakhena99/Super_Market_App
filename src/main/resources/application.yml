server:
  port: 8080
spring:
  application:
    name: supermarket-app
  datasource:
    url: jdbc:h2:mem:supermarketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
logging:
  level:
    root: INFO
    com.example.supermarket: DEBUG
management:
  endpoints:
    web:
      exposure:
        include: health,info

# JWT Configuration
jwt:
  secret: your-secret-key-change-this-in-production-make-it-very-long-and-secure
  expiration: 86400000
