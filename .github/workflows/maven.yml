# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Stage 1: Build
  build:
    runs-on: ubuntu-latest
    name: Build Stage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B clean compile --file pom.xml

  # Stage 2: Test
  test:
    needs: build
    runs-on: ubuntu-latest
    name: Test Stage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Run Tests with Maven
      run: mvn -B test --file pom.xml
    
    - name: Generate Coverage Report
      run: mvn -B jacoco:report --file pom.xml
      continue-on-error: true
    
    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./target/site/jacoco/jacoco.xml
      continue-on-error: true

  # Stage 3: SonarQube Code Analysis
  sonarqube:
    needs: test
    runs-on: ubuntu-latest
    name: SonarQube Analysis Stage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: SonarQube Scan
      run: |
        mvn -B clean verify sonar:sonar \
          -Dsonar.projectKey=Super_Market_App \
          -Dsonar.sources=src \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      continue-on-error: true

  # Stage 4: Code Quality & Formatting (COF)
  cof:
    needs: test
    runs-on: ubuntu-latest
    name: Code Quality & Formatting Stage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Checkstyle Analysis
      run: mvn -B checkstyle:check --file pom.xml
      continue-on-error: true
    
    - name: PMD Analysis
      run: mvn -B pmd:check --file pom.xml
      continue-on-error: true
    
    - name: SpotBugs Analysis
      run: mvn -B spotbugs:check --file pom.xml
      continue-on-error: true

  # Stage 5: Run & Package
  run:
    needs: [sonarqube, cof]
    runs-on: ubuntu-latest
    name: Package & Run Stage
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Package with Maven
      run: mvn -B package -DskipTests --file pom.xml
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: maven-artifacts
        path: target/*.jar
      continue-on-error: true

  # Update Dependency Graph
  dependency-graph:
    needs: build
    runs-on: ubuntu-latest
    name: Update Dependency Graph
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
