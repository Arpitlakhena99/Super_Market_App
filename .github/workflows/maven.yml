# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Stage 1: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile with Maven
        run: mvn -B compile --file pom.xml

  # ── Stage 2: Test ───────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test --file pom.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ── Stage 3: SonarQube ──────────────────────────────────────────────────────
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for accurate blame/SCM data

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: SonarQube analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "${SONAR_TOKEN}" ]; then
            echo "::warning::SONAR_TOKEN secret not configured – skipping SonarQube analysis"
            exit 0
          fi
          mvn -B sonar:sonar \
            -Dsonar.projectKey=supermarket-app \
            -Dsonar.host.url=${SONAR_HOST_URL:-https://sonarcloud.io} \
            -Dsonar.login=${SONAR_TOKEN} \
            --file pom.xml

  # ── Stage 4: Code Quality & Formatting (cof) ────────────────────────────────
  cof:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        # Soft-fail if the Checkstyle plugin is not yet configured in pom.xml
        run: |
          if mvn -B help:describe -Dplugin=checkstyle --file pom.xml -q 2>/dev/null; then
            mvn -B checkstyle:check --file pom.xml
          else
            echo "::warning::Checkstyle plugin not configured in pom.xml – skipping"
          fi

      - name: Verify code formatting
        run: mvn -B validate --file pom.xml

  # ── Stage 5: Package & Run ──────────────────────────────────────────────────
  run:
    name: Package
    runs-on: ubuntu-latest
    needs: [ test, cof ]
    permissions:
      contents: write  # required to submit the dependency graph

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and package application
        run: mvn -B package --file pom.xml

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: supermarket-app
          path: target/*.jar

      # Optional: Uploads the full dependency graph to GitHub to improve the
      # quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        # pinned to v0.0.4 of advanced-security/maven-dependency-submission-action
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
